services:
  audio-visualizer:
    build:
      context: ./audio-visualizer
      dockerfile: Dockerfile
    container_name: synthesia-app
    restart: unless-stopped
    expose:
      - "8081"
    networks:
      - synthesia-net

  nginx:
    image: nginx:1.27-alpine
    container_name: synthesia-nginx
    restart: unless-stopped
    ports:
      - "8081:8081"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - audio-visualizer
    networks:
      - synthesia-net

networks:
  synthesia-net:
    driver: bridge
